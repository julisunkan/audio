<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Texts to Audiobooks Creator{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <link rel="manifest" href="/static/manifest.json"/>
  <meta name="theme-color" content="#2563eb"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="/static/icon-512.png"/>
  <link rel="apple-touch-icon" href="/static/icon-192.png"/>
</head>
<body>
<div id="notify"></div>

<!-- SVG defs for gradient brand icon -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="50%"  stop-color="#34d399"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
</svg>

<nav class="nav">
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="url(#brand-grad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
    🎧 AudioBooks
  </div>
  <div class="nav-links">
    <a href="/" class="{% if request.path == '/' %}active{% endif %}">
      ✨ Create
    </a>
    <a href="/dashboard" class="{% if request.path == '/dashboard' %}active{% endif %}">
      📚 Library
    </a>
  </div>
</nav>

{% block content %}{% endblock %}

<script src="/static/js/app.js"></script>
</body>
</html>
