{% extends "base.html" %}
{% block title %}Dashboard — Texts to Audiobooks Creator{% endblock %}
{% block content %}
<div class="container">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:6px;">
    <div class="page-title" style="margin-bottom:0;">📚 My Audiobooks</div>
    <button id="export-zip-btn" class="btn btn-secondary" style="display:none;" onclick="exportAllZip()">
      📦 Download All as ZIP
    </button>
  </div>
  <div class="page-subtitle">Your recent audiobook projects. Click a project to view details or download.</div>

  <div id="export-progress" style="display:none;" class="card" style="padding:14px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="spinner"></span>
      <span id="export-progress-text" style="font-size:.9rem;color:var(--muted);">Preparing your ZIP file…</span>
    </div>
  </div>

  <div id="project-list" class="project-list">
    <div style="text-align:center;padding:32px;color:var(--muted);">
      <span class="spinner"></span> Loading projects…
    </div>
  </div>

  <div style="text-align:center;margin-top:20px;">
    <button id="load-more" class="btn btn-secondary" style="display:none;">Load More</button>
  </div>

  <div style="text-align:center;margin-top:32px;">
    <a href="/" class="btn btn-primary">+ Create New Audiobook</a>
  </div>
</div>
{% endblock %}
